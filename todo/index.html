<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Task | Modern Daily Checklist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --bg: #05060f;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Modern Background effect */
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: #05060f;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        .blob-2 {
            background: linear-gradient(135deg, var(--accent), var(--primary));
            width: 400px;
            height: 400px;
            right: 0;
            bottom: 0;
            animation: move 15s infinite alternate-reverse;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        .container {
            width: 100%;
            max-width: 520px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 36px;
            padding: 40px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.5);
            animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .date-text {
            color: var(--text-dim);
            font-size: 1rem;
            font-weight: 400;
        }

        /* Dashboard Stats */
        .dashboard {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }

        .stat-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            display: block;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* Progress Bar */
        .progress-wrap {
            margin-bottom: 32px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .progress-bar {
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .progress-inner {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 12px;
            transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        /* Input Interaction */
        .input-box {
            position: relative;
            margin-bottom: 32px;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px 70px 20px 24px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.4s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.15);
        }

        .add-btn {
            position: absolute;
            right: 8px;
            top: 8px;
            bottom: 8px;
            width: 52px;
            background: var(--primary);
            border: none;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-btn:hover {
            transform: scale(1.05);
            background: #7c3aed;
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
        }

        /* List Items */
        .todo-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .todo-list::-webkit-scrollbar {
            width: 4px;
        }

        .todo-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .todo-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px 24px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            animation: popIn 0.5s ease backwards;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .todo-item:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .checkbox {
            width: 28px;
            height: 28px;
            border: 2px solid var(--border);
            border-radius: 10px;
            margin-right: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .todo-item.done .checkbox {
            background: var(--success);
            border-color: var(--success);
        }

        .checkbox svg {
            width: 16px;
            height: 16px;
            color: white;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .todo-item.done .checkbox svg {
            opacity: 1;
            transform: scale(1);
        }

        .todo-text {
            flex: 1;
            font-size: 1.05rem;
            color: var(--text);
            transition: all 0.3s;
        }

        .todo-item.done .todo-text {
            color: var(--text-dim);
            text-decoration: line-through;
            opacity: 0.5;
        }

        .del-btn {
            opacity: 0;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .todo-item:hover .del-btn {
            opacity: 1;
        }

        .del-btn:hover {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 50px 0;
            display: none;
        }

        .empty-state p {
            color: var(--text-dim);
            font-style: italic;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            opacity: 0.5;
        }

        /* Loading Animation */
        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="aurora-bg">
        <div class="blob"></div>
        <div class="blob-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>Aurora Task</h1>
            <div id="current-date" class="date-text"></div>
        </header>

        <div class="dashboard">
            <div class="stat-card">
                <span class="stat-value" id="stat-total">0</span>
                <span class="stat-label">Tasks</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" style="color: var(--success)" id="stat-done">0</span>
                <span class="stat-label">Done</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" style="color: var(--primary)" id="stat-left">0</span>
                <span class="stat-label">Left</span>
            </div>
        </div>

        <div class="progress-wrap">
            <div class="progress-info">
                <span>Daily Momentum</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar">
                <div id="progress-indicator" class="progress-inner"></div>
            </div>
        </div>

        <div class="input-box">
            <input type="text" id="todo-input" placeholder="업무를 입력하고 Enter를 누르세요..." autocomplete="off">
            <button id="add-trigger" class="add-btn">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
            </button>
        </div>

        <ul id="todo-list" class="todo-list">
            <!-- Dynamic Injection -->
        </ul>

        <div id="empty-state" class="empty-state">
            <p>오늘의 모든 목표를 달성했습니다. 완벽한 하루네요! ✨</p>
        </div>
    </div>

    <script>
        const API_EP = 'api.php';
        const todoInput = document.getElementById('todo-input');
        const addTrigger = document.getElementById('add-trigger');
        const todoList = document.getElementById('todo-list');
        const emptyState = document.getElementById('empty-state');
        
        let localTasks = [];

        async function initApp() {
            setDateTime();
            await refreshData();

            addTrigger.addEventListener('click', handleAdd);
            todoInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleAdd();
            });
        }

        function setDateTime() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').textContent = new Date().toLocaleDateString('ko-KR', options);
        }

        async function refreshData() {
            try {
                const res = await fetch(API_EP);
                localTasks = await res.json();
                renderView();
            } catch (err) {
                console.error('Data sync failed:', err);
            }
        }

        function renderView() {
            todoList.innerHTML = '';
            
            if (localTasks.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                localTasks.forEach(task => {
                    const finished = task.completed == 1 || task.completed === true;
                    const item = document.createElement('li');
                    item.className = `todo-item ${finished ? 'done' : ''}`;
                    item.innerHTML = `
                        <div class="checkbox" onclick="handleToggle(${task.id})">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </div>
                        <div class="todo-text" onclick="handleToggle(${task.id})">${task.text}</div>
                        <button class="del-btn" onclick="handleDelete(${task.id})">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    `;
                    todoList.appendChild(item);
                });
            }
            syncMetrics();
        }

        function syncMetrics() {
            const total = localTasks.length;
            const done = localTasks.filter(t => t.completed == 1 || t.completed === true).length;
            const left = total - done;
            const p = total > 0 ? Math.round((done / total) * 100) : 0;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-done').textContent = done;
            document.getElementById('stat-left').textContent = left;
            document.getElementById('progress-indicator').style.width = p + '%';
            document.getElementById('progress-percent').textContent = p + '%';
        }

        async function handleAdd() {
            const txt = todoInput.value.trim();
            if (!txt) return;

            addTrigger.disabled = true;
            addTrigger.innerHTML = '<div class="loader"></div>';

            try {
                const res = await fetch(API_EP, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: txt })
                });
                const added = await res.json();
                localTasks.unshift(added);
                todoInput.value = '';
                renderView();
            } catch (err) {
                console.error('Adding failed:', err);
            } finally {
                addTrigger.disabled = false;
                addTrigger.innerHTML = '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>';
            }
        }

        async function handleToggle(id) {
            try {
                await fetch(API_EP, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                localTasks = localTasks.map(t => t.id == id ? { ...t, completed: !t.completed } : t);
                renderView();
            } catch (err) {
                console.error('Toggle failed:', err);
            }
        }

        async function handleDelete(id) {
            try {
                await fetch(`${API_EP}?id=${id}`, { method: 'DELETE' });
                localTasks = localTasks.filter(t => t.id != id);
                renderView();
            } catch (err) {
                console.error('Delete failed:', err);
            }
        }

        initApp();
    </script>
</body>
</html>
