<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Task | Premium Productivity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --bg: #05060f;
            --card-bg: rgba(15, 23, 42, 0.7);
            --border: rgba(255, 255, 255, 0.12);
            --text: #ffffff;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background with Generated Voxel Image */
        .app-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: url('bg.png') no-repeat center center;
            background-size: cover;
            filter: blur(4px) brightness(0.4);
            transform: scale(1.1);
        }

        .aurora-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 540px;
            background: var(--card-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 48px;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.6);
            animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Real-time Clock Panel */
        .clock-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 12px 24px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.8s var(--ease-bounce) 0.2s backwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .clock-time {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .clock-date {
            text-align: right;
        }

        .clock-date .day {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            color: #fff;
        }

        .clock-date .full {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 32px;
            text-align: center;
        }

        /* Dashboard Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            border: 1px solid var(--border);
            transition: transform 0.3s var(--ease-bounce);
        }

        .stat-box:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.06);
        }

        .stat-box .val {
            font-size: 1.6rem;
            font-weight: 800;
            display: block;
        }

        .stat-box .lbl {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* Progress Bar */
        .progress-container {
            margin-bottom: 32px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .progress-bar {
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 20px;
            transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
        }

        /* Input */
        .input-group {
            position: relative;
            margin-bottom: 32px;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px 60px 18px 24px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.2);
        }

        .add-btn {
            position: absolute;
            right: 8px;
            top: 8px;
            bottom: 8px;
            width: 48px;
            background: var(--primary);
            border: none;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4);
        }

        /* Todo Area */
        .todo-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
        }

        .todo-area::-webkit-scrollbar { width: 4px; }
        .todo-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .todo-list { list-style: none; }

        /* Bounce Animations */
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 0.8; }
            70% { transform: scale(0.9); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes bounceOut {
            20% { transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0; transform: scale(0.3); }
        }

        @keyframes checkBounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .todo-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            transition: all 0.3s var(--ease-bounce);
            animation: bounceIn 0.5s var(--ease-bounce) backwards;
        }

        .todo-item.deleting {
            animation: bounceOut 0.5s var(--ease-bounce) forwards;
        }

        .todo-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .checkbox {
            width: 26px;
            height: 26px;
            border: 2px solid var(--border);
            border-radius: 8px;
            margin-right: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .todo-item.done .checkbox {
            background: var(--success);
            border-color: var(--success);
            animation: checkBounce 0.4s var(--ease-bounce);
        }

        .checkbox svg {
            width: 14px;
            height: 14px;
            color: white;
            display: none;
        }

        .todo-item.done .checkbox svg { display: block; }

        .todo-text {
            flex: 1;
            font-size: 1rem;
            color: var(--text);
            transition: all 0.3s;
        }

        .todo-item.done .todo-text {
            color: var(--text-dim);
            text-decoration: line-through;
            opacity: 0.5;
        }

        .del-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            opacity: 0;
            transition: all 0.2s;
        }

        .todo-item:hover .del-btn { opacity: 1; }

        .del-btn:hover {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .empty {
            text-align: center;
            padding: 40px 0;
            color: var(--text-dim);
            font-style: italic;
        }

        /* Loading Spinner */
        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-bg"></div>
    <div class="aurora-overlay"></div>

    <div class="container">
        <!-- New Clock Panel -->
        <div class="clock-panel" id="clock-container">
            <div class="clock-time" id="clock-time">00:00:00</div>
            <div class="clock-date">
                <span class="day" id="clock-day">TUESDAY</span>
                <span class="full" id="clock-date">MARCH 17, 2026</span>
            </div>
        </div>

        <header>
            <h1>Aurora Task</h1>
        </header>

        <div class="stats">
            <div class="stat-box">
                <span class="val" id="stat-all">0</span>
                <span class="lbl">Total</span>
            </div>
            <div class="stat-box">
                <span class="val" style="color: var(--success)" id="stat-done">0</span>
                <span class="lbl">Done</span>
            </div>
            <div class="stat-box">
                <span class="val" style="color: var(--primary)" id="stat-left">0</span>
                <span class="lbl">Left</span>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-header">
                <span>Momentum</span>
                <span id="progress-val">0%</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="todo-input" placeholder="새로운 할 일을 입력하세요..." autocomplete="off">
            <button id="add-trigger" class="add-btn">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
            </button>
        </div>

        <div class="todo-area">
            <ul id="todo-list" class="todo-list"></ul>
            <div id="empty-msg" class="empty">모두 완료했습니다! 🎉</div>
        </div>
    </div>

    <script>
        const API = 'api.php';
        const todoInput = document.getElementById('todo-input');
        const listEl = document.getElementById('todo-list');
        const emptyEl = document.getElementById('empty-msg');
        
        let tasks = [];

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const dayStr = now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
            const dateStr = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });

            document.getElementById('clock-time').textContent = timeStr;
            document.getElementById('clock-day').textContent = dayStr;
            document.getElementById('clock-date').textContent = dateStr;
        }

        async function init() {
            updateClock();
            setInterval(updateClock, 1000);
            await load();

            document.getElementById('add-trigger').onclick = add;
            todoInput.onkeypress = (e) => { if (e.key === 'Enter') add(); };
        }

        async function load() {
            const res = await fetch(API);
            tasks = await res.json();
            render();
        }

        function render() {
            listEl.innerHTML = '';
            if (tasks.length === 0) {
                emptyEl.style.display = 'block';
            } else {
                emptyEl.style.display = 'none';
                tasks.forEach(t => {
                    const isDone = t.completed == 1 || t.completed === true;
                    const li = document.createElement('li');
                    li.className = `todo-item ${isDone ? 'done' : ''}`;
                    li.id = `task-${t.id}`;
                    li.innerHTML = `
                        <div class="checkbox" onclick="toggle(${t.id})">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </div>
                        <div class="todo-text" onclick="toggle(${t.id})">${t.text}</div>
                        <button class="del-btn" onclick="remove(${t.id})">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"></path></svg>
                        </button>
                    `;
                    listEl.appendChild(li);
                });
            }
            updateStats();
        }

        function updateStats() {
            const total = tasks.length;
            const done = tasks.filter(t => t.completed == 1 || t.completed === true).length;
            const left = total - done;
            const p = total > 0 ? Math.round((done / total) * 100) : 0;

            document.getElementById('stat-all').textContent = total;
            document.getElementById('stat-done').textContent = done;
            document.getElementById('stat-left').textContent = left;
            document.getElementById('progress-fill').style.width = p + '%';
            document.getElementById('progress-val').textContent = p + '%';
        }

        async function add() {
            const txt = todoInput.value.trim();
            if (!txt) return;

            const trigger = document.getElementById('add-trigger');
            trigger.disabled = true;
            trigger.innerHTML = '<div class="loader"></div>';

            const res = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: txt })
            });
            const nt = await res.json();
            tasks.unshift(nt);
            todoInput.value = '';
            render();
            
            trigger.disabled = false;
            trigger.innerHTML = '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>';
        }

        async function toggle(id) {
            await fetch(API, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
            tasks = tasks.map(t => t.id == id ? { ...t, completed: !t.completed } : t);
            
            // Allow check animation to play before re-rendering for optimal feedback
            const el = document.getElementById(`task-${id}`);
            el.classList.toggle('done');
            updateStats();
        }

        async function remove(id) {
            const el = document.getElementById(`task-${id}`);
            el.classList.add('deleting');
            
            // Wait for bounce out animation
            setTimeout(async () => {
                await fetch(`${API}?id=${id}`, { method: 'DELETE' });
                tasks = tasks.filter(t => t.id != id);
                render();
            }, 400);
        }

        init();
    </script>
</body>
</html>
