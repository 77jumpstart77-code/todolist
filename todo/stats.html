<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Insight | Task Statistics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #8b5cf6;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 24px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-item .value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            display: block;
        }

        .stat-item .label {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-dim);
            text-decoration: none;
            margin-bottom: 20px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="zenith.html" class="back-link">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-right: 8px;"><path d="M19 12H5M12 19l-7-7 7-7"></path></svg>
            Back to Dashboard
        </a>

        <header>
            <h1>Task Insights</h1>
            <p style="color: var(--text-dim);">날짜별 완료 데이터 분석</p>
        </header>

        <div class="card">
            <h2 style="margin-bottom: 20px; font-size: 1.2rem;">Last 30 Days completion</h2>
            <div class="chart-container">
                <canvas id="statsChart"></canvas>
            </div>
        </div>

        <div class="stat-grid" id="stat-summary">
            <div class="stat-item">
                <span class="value" id="count-today">0</span>
                <span class="label">Today Completed</span>
            </div>
            <div class="stat-item">
                <span class="value" id="count-total">0</span>
                <span class="label">Overall Score</span>
            </div>
        </div>
    </div>

    <script>
        async function loadStats() {
            try {
                const response = await fetch('api.php?action=stats');
                const data = await response.json();
                
                renderChart(data);
                updateSummary(data);
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        function updateSummary(data) {
            const today = new Date().toISOString().split('T')[0];
            const todayStat = data.find(d => d.date === today);
            const total = data.reduce((acc, curr) => acc + parseInt(curr.count), 0);
            
            document.getElementById('count-today').textContent = todayStat ? todayStat.count : 0;
            document.getElementById('count-total').textContent = total;
        }

        function renderChart(data) {
            const ctx = document.getElementById('statsChart').getContext('2d');
            
            // Reverse data for chronological order
            const sortedData = [...data].reverse();
            
            const labels = sortedData.map(d => d.date);
            const counts = sortedData.map(d => d.count);

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Tasks Completed',
                        data: counts,
                        borderColor: '#8b5cf6',
                        backgroundColor: 'rgba(139, 92, 246, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#8b5cf6',
                        pointBorderColor: '#fff',
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#94a3b8', stepSize: 1 }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
        }

        loadStats();
    </script>
</body>
</html>
