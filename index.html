<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Work Checklist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .date-display {
            font-size: 0.9rem;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }

        .progress-container {
            margin-bottom: 30px;
        }

        .progress-bar-bg {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(to right, #6366f1, #a855f7);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-text {
            font-size: 0.85rem;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .add-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        ul {
            list-style: none;
        }

        li {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            transition: all 0.3s;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        li:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: scale(1.02);
        }

        .checkbox-custom {
            width: 24px;
            height: 24px;
            border: 2px solid var(--glass-border);
            border-radius: 6px;
            margin-right: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .checkbox-custom.checked {
            background: var(--success);
            border-color: var(--success);
        }

        .checkbox-custom.checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .task-text {
            flex: 1;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .task-text.completed {
            color: var(--text-dim);
            text-decoration: line-through;
            opacity: 0.6;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 5px;
            opacity: 0;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        li:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 40px 0;
            color: var(--text-dim);
        }

        .footer-info {
            margin-top: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>My Daily Tasks</h1>
            <div id="date-display" class="date-display"></div>
        </header>

        <div class="progress-container">
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-bar-fill"></div>
            </div>
            <div class="progress-text">
                <span id="progress-label">Today's Progress</span>
                <span id="progress-percent">0%</span>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="task-input" placeholder="새로운 할 일을 입력하세요..." autocomplete="off">
            <button class="add-btn" id="add-btn">추가</button>
        </div>

        <ul id="task-list">
            <!-- Tasks will be injected here -->
        </ul>

        <div id="empty-state" class="empty-state" style="display: none;">
            <p>할 일이 없습니다. 새로운 작업을 추가해보세요!</p>
        </div>

        <div class="footer-info">
            본 데이터는 브라우저 로컬 저장소에 안전하게 유지됩니다.
        </div>
    </div>

    <script>
        const taskInput = document.getElementById('task-input');
        const addBtn = document.getElementById('add-btn');
        const taskList = document.getElementById('task-list');
        const emptyState = document.getElementById('empty-state');
        const progressFill = document.getElementById('progress-fill');
        const progressPercent = document.getElementById('progress-percent');
        const dateDisplay = document.getElementById('date-display');

        let tasks = JSON.parse(localStorage.getItem('dailyTasks')) || [
            { id: 1, text: '이메일 확인 및 회신', completed: false },
            { id: 2, text: '일일 업무 계획 수립', completed: false },
            { id: 3, text: '회의 참석 및 기록', completed: false }
        ];

        function init() {
            renderDate();
            renderTasks();
            
            addBtn.addEventListener('click', addTask);
            taskInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTask();
            });
        }

        function renderDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            dateDisplay.textContent = now.toLocaleDateString('ko-KR', options);
        }

        function saveTasks() {
            localStorage.setItem('dailyTasks', JSON.stringify(tasks));
            updateProgress();
        }

        function updateProgress() {
            if (tasks.length === 0) {
                progressFill.style.width = '0%';
                progressPercent.textContent = '0%';
                return;
            }
            const completedCount = tasks.filter(t => t.completed).length;
            const percentage = Math.round((completedCount / tasks.length) * 100);
            progressFill.style.width = percentage + '%';
            progressPercent.textContent = percentage + '%';
        }

        function renderTasks() {
            taskList.innerHTML = '';
            
            if (tasks.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                tasks.forEach(task => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <div class="checkbox-custom ${task.completed ? 'checked' : ''}" onclick="toggleTask(${task.id})"></div>
                        <span class="task-text ${task.completed ? 'completed' : ''}">${task.text}</span>
                        <button class="delete-btn" onclick="deleteTask(${task.id})">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"></path>
                            </svg>
                        </button>
                    `;
                    taskList.appendChild(li);
                });
            }
            updateProgress();
        }

        function addTask() {
            const text = taskInput.value.trim();
            if (text) {
                const newTask = {
                    id: Date.now(),
                    text: text,
                    completed: false
                };
                tasks.push(newTask);
                taskInput.value = '';
                saveTasks();
                renderTasks();
            }
        }

        function toggleTask(id) {
            tasks = tasks.map(task => 
                task.id === id ? { ...task, completed: !task.completed } : task
            );
            saveTasks();
            renderTasks();
        }

        function deleteTask(id) {
            tasks = tasks.filter(task => task.id !== id);
            saveTasks();
            renderTasks();
        }

        init();
    </script>
</body>
</html>
